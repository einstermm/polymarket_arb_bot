version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: polymarket_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "${MYSQL_PORT}:3306" # 将容器内的 3306 端口映射到宿主机，方便你用可视化工具连接
    volumes:
      - mysql_data:/var/lib/mysql # 持久化数据库数据，容器重启数据不丢失
      - ./scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql # 自动执行建表脚本
    command: --default-authentication-plugin=mysql_native_password

  bot:
    build: .
    container_name: polymarket_bot
    restart: always
    depends_on:
      - db # 确保数据库先启动
    environment:
      - MYSQL_HOST=db # 在 Docker 网络中，直接使用服务名作为 host
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DB=${MYSQL_DB}
    volumes:
      - .:/app # 将本地代码挂载到容器，你修改本地代码后只需重启容器即可生效

volumes:
  mysql_data: